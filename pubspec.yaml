name: supplement_tracker
description: "补剂管家：营养补剂跟踪器（Flutter 版）"
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  share_plus: ^11.1.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  image_path: "assets/icons/app_icon.png"
  android: "launcher_icon"
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/app_icon.png
