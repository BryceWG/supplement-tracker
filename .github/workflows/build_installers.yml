name: Build Installers

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.2"

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          if-no-files-found: error
          path: |
            build/app/outputs/flutter-apk/app-release.apk

  windows:
    name: Windows (Installer EXE)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Resolve build dir + app version
        shell: pwsh
        run: |
          $verLine = (Select-String -Path "pubspec.yaml" -Pattern "^version:" | Select-Object -First 1).Line
          if (-not $verLine) { throw "version not found in pubspec.yaml" }
          $verRaw = $verLine.Split(":", 2)[1].Trim()
          $ver = $verRaw.Split("+")[0].Trim()
          if (-not $ver) { throw "failed to parse app version" }

          $releaseDir = Get-ChildItem -Path "build\\windows" -Recurse -Directory |
            Where-Object { $_.FullName -match "\\\\runner\\\\Release$" } |
            Select-Object -First 1
          if (-not $releaseDir) { throw "Windows Release folder not found under build/windows" }

          "APP_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "BUILD_DIR=$($releaseDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          if (-not (Test-Path "installer\\windows\\supplement_tracker.iss")) {
            throw "installer script missing: installer\\windows\\supplement_tracker.iss"
          }
          New-Item -ItemType Directory -Force -Path "dist\\windows" | Out-Null
          $iscc = (Get-Command "ISCC.exe" -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            $fallback = "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"
            if (Test-Path $fallback) { $iscc = $fallback }
          }
          if (-not $iscc) { throw "ISCC.exe not found after installing Inno Setup" }

          & $iscc `
            "/DMyAppVersion=$env:APP_VERSION" `
            "/Odist\\windows" `
            "installer\\windows\\supplement_tracker.iss"

      - name: Checksums (SHA256)
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "dist\\windows" -Filter "*.exe" | Sort-Object Name
          if (-not $files) { throw "No installer exe found in dist\\windows" }
          $out = "dist\\windows\\sha256.txt"
          Remove-Item -Force -ErrorAction SilentlyContinue $out
          foreach ($f in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $f.FullName).Hash.ToLowerInvariant()
            "$hash  $($f.Name)" | Out-File -FilePath $out -Append -Encoding ascii
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: error
          path: |
            dist/windows/*.exe
            dist/windows/sha256.txt

  macos:
    name: macOS (DMG)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS (release)
        run: flutter build macos --release

      - name: Package .app into DMG
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(ls -1 build/macos/Build/Products/Release/*.app | head -n 1)"
          echo "Found app: $APP_PATH"

          STAGING_DIR="macos_dmg_staging"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"

          DMG_NAME="supplement-tracker-macos.dmg"
          hdiutil create -volname "补剂管家" -srcfolder "$STAGING_DIR" -ov -format UDZO "$DMG_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          if-no-files-found: error
          path: supplement-tracker-macos.dmg

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [android, windows, macos]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist_artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist_artifacts/android-release/*.apk
            dist_artifacts/windows-release/*.exe
            dist_artifacts/windows-release/sha256.txt
            dist_artifacts/macos-release/*.dmg
