name: Build Installers

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.2"

jobs:
  android:
    name: Android (APK/AAB)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Build App Bundle (release)
        run: flutter build appbundle --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          if-no-files-found: error
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  windows:
    name: Windows (ZIP)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Upload artifacts (folder)
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: error
          path: build/windows/**/runner/Release/

  macos:
    name: macOS (APP ZIP)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS (release)
        run: flutter build macos --release

      - name: Package .app into zip
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(ls -1 build/macos/Build/Products/Release/*.app | head -n 1)"
          echo "Found app: $APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" macos-release.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          if-no-files-found: error
          path: macos-release.zip

