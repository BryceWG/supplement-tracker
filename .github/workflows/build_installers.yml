name: Build Installers

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.2"

jobs:
  android:
    name: Android (APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Require Android signing secrets (tags)
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for v in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!v:-}" ]; then
              echo "::error title=Missing secret::$v is required to sign Android release APKs for tag builds."
              exit 1
            fi
          done

      - name: Configure Android signing (release)
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "Android signing secrets not configured; using debug signing key."
            exit 0
          fi

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          chmod 600 android/app/upload-keystore.jks

          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          chmod 600 android/key.properties

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          if-no-files-found: error
          path: |
            build/app/outputs/flutter-apk/app-release.apk

  windows:
    name: Windows (Installer EXE)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Resolve build dir + app version
        shell: pwsh
        run: |
          $verLine = (Select-String -Path "pubspec.yaml" -Pattern "^version:" | Select-Object -First 1).Line
          if (-not $verLine) { throw "version not found in pubspec.yaml" }
          $verRaw = $verLine.Split(":", 2)[1].Trim()
          $ver = $verRaw.Split("+")[0].Trim()
          if (-not $ver) { throw "failed to parse app version" }

          $cmake = (Get-Content "windows\\CMakeLists.txt" -ErrorAction Stop) -join "`n"
          $m = [regex]::Match($cmake, 'set\\(BINARY_NAME\\s+\"(?<name>[^\"]+)\"\\)')
          $binaryName = if ($m.Success) { $m.Groups['name'].Value } else { "supplement_tracker" }
          $exeName = "$binaryName.exe"

          $exe = Get-ChildItem -Path "build\\windows" -Recurse -File -Filter $exeName | Select-Object -First 1
          if (-not $exe) {
            throw "Built executable not found under build/windows (expected $exeName)"
          }

          $releaseDir = Split-Path -Parent $exe.FullName

          "APP_VERSION=$ver" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "BUILD_DIR=$releaseDir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          if (-not (Test-Path "installer\\windows\\supplement_tracker.iss")) {
            throw "installer script missing: installer\\windows\\supplement_tracker.iss"
          }
          New-Item -ItemType Directory -Force -Path "dist\\windows" | Out-Null
          $iscc = (Get-Command "ISCC.exe" -ErrorAction SilentlyContinue).Source
          if (-not $iscc) {
            $fallback = "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"
            if (Test-Path $fallback) { $iscc = $fallback }
          }
          if (-not $iscc) { throw "ISCC.exe not found after installing Inno Setup" }

          # Ensure Chinese language file exists (some minimal installs omit Languages/*).
          $langDir = Join-Path (Split-Path -Parent $iscc) "Languages"
          $cnIsl = Join-Path $langDir "ChineseSimplified.isl"
          if (-not (Test-Path $cnIsl)) {
            New-Item -ItemType Directory -Force -Path $langDir | Out-Null
            try {
              $uri = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/ChineseSimplified.isl"
              Invoke-WebRequest -Uri $uri -OutFile $cnIsl -UseBasicParsing
            } catch {
              Write-Host "Warning: failed to download ChineseSimplified.isl, will fall back to default language."
            }
          }

          & $iscc `
            "/DMyAppVersion=$env:APP_VERSION" `
            "/Odist\\windows" `
            "installer\\windows\\supplement_tracker.iss"

      - name: Checksums (SHA256)
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "dist\\windows" -Filter "*.exe" | Sort-Object Name
          if (-not $files) { throw "No installer exe found in dist\\windows" }
          $out = "dist\\windows\\sha256.txt"
          Remove-Item -Force -ErrorAction SilentlyContinue $out
          foreach ($f in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 -Path $f.FullName).Hash.ToLowerInvariant()
            "$hash  $($f.Name)" | Out-File -FilePath $out -Append -Encoding ascii
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          if-no-files-found: error
          path: |
            dist/windows/*.exe
            dist/windows/sha256.txt

  macos:
    name: macOS (DMG)
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build macOS (release)
        run: flutter build macos --release

      - name: Package .app into DMG
        shell: bash
        run: |
          set -euo pipefail
          APP_PATH="$(ls -1d build/macos/Build/Products/Release/*.app | head -n 1)"
          echo "Found app: $APP_PATH"

          STAGING_DIR="macos_dmg_staging"
          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR"
          cp -R "$APP_PATH" "$STAGING_DIR/"
          ln -s /Applications "$STAGING_DIR/Applications"

          DMG_NAME="supplement-tracker-macos.dmg"
          hdiutil create -volname "补剂管家" -srcfolder "$STAGING_DIR" -ov -format UDZO "$DMG_NAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          if-no-files-found: error
          path: supplement-tracker-macos.dmg

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [android, windows, macos]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist_artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist_artifacts/android-release/*.apk
            dist_artifacts/windows-release/*.exe
            dist_artifacts/windows-release/sha256.txt
            dist_artifacts/macos-release/*.dmg
